name: Portable release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-2022
          - target: linux-x64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Install Linux desktop runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libgl1 libgl1-mesa-dri libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0

      - name: Install build dependencies
        run: python -m pip install --upgrade pip -r requirements-build.txt

      - name: Run headless-safe core tests
        run: >-
          python -m pytest
          tests/test_model.py
          tests/test_project_io.py
          tests/test_runtime_env.py
          tests/test_step_loader.py
          tests/test_step_subprocess.py
          tests/test_urdf_io.py

      - name: Build portable archive
        run: python packaging/build_portable.py --output-dir release

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: release/*
          if-no-files-found: error
          compression-level: 0

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" release/* --generate-notes --verify-tag
